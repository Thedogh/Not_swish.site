<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is not_swish a good person?</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 50px;
    background-color: #f0f0f0;
    margin: 0;
    overflow: hidden;
}

#question {
    font-size: 24px;
    margin-bottom: 20px;
}

.option-btn {
    padding: 10px 20px;
    margin: 10px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background-color: #4CAF50;
    color: white;
}

.option-btn:hover {
    background-color: #45a049;
}

#response-area {
    margin-top: 30px;
    font-size: 40px;
    min-height: 100px;
}

#video-placeholder {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    object-fit: cover;
    z-index: 9999;
}
</style>
</head>

<body>

<div id="question">Is not_swish a good person?</div>

<button class="option-btn" onclick="selectOption('yes')">Yes</button>
<button class="option-btn" onclick="selectOption('no')">No</button>

<div id="response-area"></div>

<video id="video-placeholder" autoplay muted loop playsinline>
    <source src="video.mp4" type="video/mp4">
</video>

<script>

function selectOption(choice) {

    const responseArea = document.getElementById("response-area");
    const video = document.getElementById("video-placeholder");
    const question = document.getElementById("question");
    const buttons = document.querySelectorAll(".option-btn");

    buttons.forEach(btn => btn.style.display = "none");
    question.style.display = "none";

    if (choice === "yes") {

        responseArea.innerHTML = "✔️";

    } else {

        responseArea.innerHTML = "";

        video.style.display = "block";

        video.play().catch(err => {
            console.log("Video failed:", err);
        });

    }

}

</script>

</body>
</html>
