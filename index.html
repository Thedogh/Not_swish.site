<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is not_swish a good person?</title>

<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f0f0f0;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

#container{
    text-align:center;
}

#question{
    font-size:70px;
    margin-bottom:40px;
}

.option-btn{
    padding:20px 40px;
    margin:15px;
    font-size:30px;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

.option-btn:hover{
    background:#45a049;
}

#response-area{
    margin-top:40px;
    font-size:150px;
}

#video-placeholder{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    object-fit:cover;
    z-index:9999;
}

</style>
</head>

<body>

<div id="container">

<div id="question">Is not_swish a good person?</div>

<button class="option-btn" onclick="selectOption('yes')">Yes</button>
<button class="option-btn" onclick="selectOption('no')">No</button>

<div id="response-area"></div>

</div>

<video id="video-placeholder">
<source src="yourvideo.mp4" type="video/mp4">
</video>

<script>

function selectOption(choice){

const responseArea = document.getElementById('response-area');
const video = document.getElementById('video-placeholder');
const question = document.getElementById('question');
const buttons = document.querySelectorAll('.option-btn');

buttons.forEach(btn => btn.style.display="none");
question.style.display="none";

if(choice==="yes"){
responseArea.innerHTML="✔️";
}

if(choice==="no"){

responseArea.innerHTML="";
video.style.display="block";

/* enable sound */
video.muted=false;
video.volume=1;

/* play video */
video.play();

/* fullscreen */
if(document.documentElement.requestFullscreen){
document.documentElement.requestFullscreen();
}

/* leave warning */
window.onbeforeunload=function(){
return "Are you sure you want to leave this site.";
};

}

}

</script>

</body>
</html>
