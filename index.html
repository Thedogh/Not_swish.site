<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is not_swish a good person?</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f0f0f0;
            margin: 0;
            overflow: hidden; /* Prevent scrolling */
        }
        #question {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .option-btn {
            padding: 10px 20px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
        }
        .option-btn:hover {
            background-color: #45a049;
        }
        #response-area {
            margin-top: 30px;
            font-size: 40px;
            min-height: 100px;
        }
        #video-placeholder {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            object-fit: cover; /* Cover the entire screen */
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="question">Is not_swish a good person?</div>
    <button class="option-btn" onclick="selectOption('yes')">Yes</button>
    <button class="option-btn" onclick="selectOption('no')">No</button>
    
    <div id="response-area"></div>
    <video id="video-placeholder" autoplay loop muted playsinline>
        <!-- To add an MP4 file, set the src attribute here, e.g., src="yourvideo.mp4" -->
        <!-- Autoplay works after user interaction (button click) -->
        <source src="" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        function selectOption(choice) {
            const responseArea = document.getElementById('response-area');
            const video = document.getElementById('video-placeholder');
            const question = document.getElementById('question');
            
            // Hide buttons and question after selection
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.style.display = 'none');
            question.style.display = 'none';
            
            if (choice === 'yes') {
                // Show checkmark for yes
                responseArea.innerHTML = '✔️';
                video.style.display = 'none';
            } else if (choice === 'no') {
                // Leave response blank, show video full screen
                responseArea.innerHTML = ''; // Blank
                video.style.display = 'block';
                
                // Play video (autoplay attribute handles it, but ensure after interaction)
                video.play();
                
                // Enter fullscreen mode
                const elem = document.documentElement; // Full document
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.mozRequestFullScreen) { // Firefox
                    elem.mozRequestFullScreen();
                } else if (elem.webkitRequestFullscreen) { // Chrome, Safari, Opera
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) { // IE/Edge
                    elem.msRequestFullscreen();
                }
                
                // Prompt on attempt to leave/close
                window.onbeforeunload = function() {
                    return "Are you sure you want to leave the site?";
                };
                
                // Example: video.src = 'yourvideo.mp4'; // Uncomment and replace if needed dynamically
            }
        }
    </script>
</body>
</html>
