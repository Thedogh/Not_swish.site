<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Background</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Make the video fill the screen */
        #video-placeholder {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Overlay text styling */
        .content-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <video id="video-placeholder" muted loop playsinline>
        <source src="yourvideo.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="content-overlay">
        <h1>Video Demo</h1>
        <p>Ensure 'yourvideo.mp4' is in the same directory as this HTML file.</p>
    </div>

</body>
</html>
